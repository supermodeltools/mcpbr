# Dead Code Benchmark — Full Run (17 Tasks, MCP + Baseline)
#
# 17 tasks (TypeScript excluded — API OOM on Consumption plan).
# Runs both MCP agent and baseline agent for comparison.
#
# Usage:
#   export SUPERMODEL_API_KEY="smsk_live_..."
#   python3 -m mcpbr run --config configs/11-full-minus-typescript.yaml -vv

